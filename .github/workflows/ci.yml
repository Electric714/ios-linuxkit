name: CI

on:
  push:
  pull_request:
      branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        cc: [clang, gcc]
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true
      - uses: actions/setup-python@v6
        with:
            python-version: '3.x'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-dev
          pip3 install meson ninja
      - name: Build
        run: |
          meson build -Dengine=asbestos -Dkernel=ish
          ninja -C build
        env:
          CC: ${{matrix.cc}}
      - name: Test
        run: ninja -C build test

  build-mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true

      - name: Install dependencies
        run: |
          brew install llvm lld ninja libarchive meson

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -project iSH.xcodeproj \
            -scheme iSH-ARM64 \
            -configuration Release \
            -arch arm64 \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath ./build/DerivedData \
            clean build

      - name: Locate built .app
        id: locate-app
        run: |
          APP_PATH=$(find ./build/DerivedData -path "*/Build/Products/Release-iphoneos/iSH ARM64.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Convert .app to unsigned .ipa
        run: |
          mkdir -p Payload
          cp -R "${{ steps.locate-app.outputs.app_path }}" Payload/
          zip -r "iSH-ARM64-unsigned.ipa" Payload
          rm -rf Payload

      - name: Upload unsigned .ipa artifact
        uses: actions/upload-artifact@v5
        with:
          name: iSH-ARM64-unsigned-ipa
          path: iSH-ARM64-unsigned.ipa
          retention-days: 14
          if-no-files-found: error
