name: CI

on:
  push:
  pull_request:
      branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        cc: [clang, gcc]
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true
      - uses: actions/setup-python@v6
        with:
            python-version: '3.x'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-dev
          pip3 install meson ninja
      - name: Build
        run: |
          meson build -Dengine=asbestos -Dkernel=ish
          ninja -C build
        env:
          CC: ${{matrix.cc}}
      - name: Test
        run: ninja -C build test

  build-mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true

      - name: Install dependencies
        run: |
          brew install llvm lld ninja libarchive meson

      # ============================================================
      # This job builds the DEFAULT Ghostty-based renderer version
      # (not the lighter xterm.js version).
      # Uses scheme iSH-ARM64 + default configuration.
      # Produces LinuxKit.app → converts to unsigned LinuxKit-unsigned.ipa
      # ============================================================

      - name: Build unsigned .app (Ghostty renderer - default)
        run: |
          xcodebuild \
            -project iSH.xcodeproj \
            -scheme iSH-ARM64 \
            -configuration Release \
            -arch arm64 \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath ./build/DerivedData \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            clean build

      - name: Locate built .app
        id: locate-app
        run: |
          APP_PATH=$(find ./build/DerivedData -name "LinuxKit.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find LinuxKit.app anywhere in DerivedData"
            echo "Contents of DerivedData:"
            find ./build/DerivedData -name "*.app" -type d | head -20 || true
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Convert .app to unsigned .ipa
        run: |
          mkdir -p Payload
          cp -R "${{ steps.locate-app.outputs.app_path }}" Payload/
          zip -r "LinuxKit-unsigned.ipa" Payload
          rm -rf Payload
          echo "Created LinuxKit-unsigned.ipa"

      - name: Upload unsigned .ipa artifact
        uses: actions/upload-artifact@v5
        with:
          name: LinuxKit-unsigned-ipa
          path: LinuxKit-unsigned.ipa
          retention-days: 14
          if-no-files-found: error