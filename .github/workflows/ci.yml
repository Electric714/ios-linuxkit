name: CI

on:
  push:
  pull_request:
      branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        cc: [clang, gcc]
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true
      - uses: actions/setup-python@v6
        with:
            python-version: '3.x'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-dev
          pip3 install meson ninja
      - name: Build
        run: |
          meson build -Dengine=asbestos -Dkernel=ish
          ninja -C build
        env:
          CC: ${{matrix.cc}}
      - name: Test
        run: ninja -C build test

  build-mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true

      - name: Install dependencies
        run: |
          brew install llvm lld ninja libarchive meson

      - name: Create unsigned export options
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>-</string>
          </dict>
          </plist>
          EOF

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -project iSH.xcodeproj \
            -scheme iSH-ARM64 \
            -configuration Release \
            -arch arm64 \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath ./build/DerivedData \
            -archivePath ./build/iSH-ARM64.xcarchive \
            clean archive

      - name: Export unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/iSH-ARM64.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v5
        with:
          name: iSH-ARM64-unsigned-ipa
          path: build/iSH-ARM64.ipa
          retention-days: 14
          if-no-files-found: error
