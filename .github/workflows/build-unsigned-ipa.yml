name: Build Unsigned .app (Manual IPA Instructions)

on:
  workflow_dispatch:
    # Manually trigger from the Actions tab

jobs:
  build-unsigned-app:
    runs-on: macos-15
    timeout-minutes: 180
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          brew install ninja lld llvm meson
          bundle install

      - name: Build unsigned iOS .app (CODE_SIGNING_ALLOWED=NO)
        run: |
          xcodebuild \
            -project iSH.xcodeproj \
            -scheme iSH-ARM64 \
            -configuration Release \
            -arch arm64 \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath ./build/DerivedData \
            clean build

      - name: Find the built .app
        id: find-app
        run: |
          APP_PATH=$(find ./build/DerivedData -name "LinuxKit.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find LinuxKit.app in DerivedData"
            echo "Contents of DerivedData:"
            find ./build/DerivedData -name "*.app" -type d | head -20 || true
            exit 1
          fi
          echo "Built unsigned app located at: $APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Upload unsigned .app artifact
        uses: actions/upload-artifact@v5
        with:
          name: LinuxKit-unsigned-app
          path: ${{ steps.find-app.outputs.app_path }}
          retention-days: 14
          if-no-files-found: error

      - name: Add IPA creation instructions to job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🚨 Unsigned Build Complete

          The workflow has built an **unsigned** `LinuxKit.app` bundle using scheme `iSH-ARM64`.

          ### How to create the unsigned .ipa file

          After downloading the `LinuxKit-unsigned-app` artifact:

          1. Unzip/extract the artifact (you should have a folder called `LinuxKit.app`)

          2. On your Mac, open Terminal and run:

          ```bash
          cd ~/Downloads   # change to wherever you extracted the .app

          mkdir -p Payload
          cp -R "LinuxKit.app" Payload/
          zip -r "LinuxKit-unsigned.ipa" Payload
          rm -rf Payload

          echo "Created: LinuxKit-unsigned.ipa"
          ```

          3. You now have `LinuxKit-unsigned.ipa` ready for sideloading (TrollStore, Scarlet, etc.).

          > **Note**: This is a completely unsigned IPA. It will not install through normal Xcode, TestFlight, or the App Store.
          EOF
